<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXPLORADOR DEL ESPACIO | NASA API</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>PROYECTO<br><span>ESPACIO</span></h1>
        <p>🚀 Explorador astronómico - NASA 👨🏻‍🚀</p>
    </header>

    <main class="container">
        
        <!-- Sección de búsqueda -->
        <section class="search-section box">
            <label for="date-input">Viajar al pasado 👀:</label>
            <input type="date" id="date-input">
            <button id="fetch-btn">Explorar 🔎</button>
        </section>

        <!-- Contenido principal del APOD -->
        <section id="apod-content" class="apod-display">
            <h2 id="title">🤖 Iniciando sistemas...</h2>
            <p id="date-display" class="fecha-texto"></p>
            
            <div id="media-container" class="media-frame"></div>

            <div class="description-card box">
                <h4>Bitácora Científica</h4>
                <p id="explanation">Esperando datos de la base espacial...</p>
                
                <button id="favorite-btn" class="btn-save">Guardar en Favoritos 🫡🚀</button>
            </div>
        </section>

        <!-- Sidebar de favoritos -->
        <aside class="favorites-section box">
            <h3>Eureka! 🧠</h3>
            <ul id="favorites-list"></ul>
        </aside>

    </main>

    <script src="apiNasa.js"></script>
</body>
</html>
